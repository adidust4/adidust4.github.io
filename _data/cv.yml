  summary: I am a PhD candidate in Computer Science at the University of Southern California. I work with Maja Matarić in the Interaction Lab and Pat Levitt in the Children’s Hospital of Los Angeles’ Developmental Neuroscience Levitt Lab. My research focuses on the use of machine learning and statistics to understand child development, specifically the impacts of mother-child interaction on child development.

