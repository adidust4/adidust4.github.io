    Research Experiences:
      - company: "University of Southern California Interaction Lab"
        position: "Ph.D. Student"
        start_date: "2023-06"
        end_date: "present"
        highlights:
          - "Conducting interdisciplinary research with Children's Hospital Los Angeles to analyze mother-infant behavioral synchrony and its associations with developmental and physiological health outcomes."
          - "Applying computational modeling, signal analysis, and human-robot interaction methods to study early-life behavioral markers."
          - "Developing a social emotional learning robotic platform for early childhood support, integrating sensing, behavior modeling, and adaptive interaction algorithms."
          - "Contributed to an NSF Convergence Accelerator project focused on enhancing social support for individuals with physical disabilities."
      - company: "Rochester Institute of Technology"
        position: "Undergraduate Researcher"
        start_date: "2022-05"
        end_date: "2022-07"
        highlights:
          - "Selected for the NSF-funded Computational Sensing for Human-centered AI program."
          - "Conducted human subjects research on Deaf and Hard-of-Hearing individuals in relation to manufacturing cobots to understand differences in teaming dynamics."
          - "Programmed the Baxter cobot and performed detailed data analysis of human subject trials."
          - "Utilized computational sensing tools including Pupil Core eyeglasses and Zephyr bioharness."
      - company: "National Institute of Standards and Technology"
        position: "Associate Research Fellow"
        start_date: "2021-05"
        end_date: "2021-08"
        highlights:
          - "Selected for the NIST Summer Undergraduate Research Fellowship (SURF) Engineering Laboratory."
          - "Researched generalizing procedural generation of 3D environments for reinforcement learning simulations in robot safety."
          - "Created an original method called Measured Alteration of Generalized Procedural Generation for Robot Agility."
          - "Developed a Unity virtual prototype to simulate the alteration in a realistic manufacturing environment."
